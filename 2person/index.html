<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>出退勤検索くん（2人版）</title>
<style>
:root {
  --bg: #0b0f1c;
  --bg-card: #111827;
  --bg-input: #1c2438;
  --border: #1e2d47;
  --text: #e2e8f0;
  --dim: #94a3b8;
  --cyan: #06b6d4;
  --orange: #f59e0b;
  --green: #22c55e;
  --warn: #f97316;
}
html.light {
  --bg: #f8fafc;
  --bg-card: #f1f5f9;
  --bg-input: #e2e8f0;
  --border: #cbd5e1;
  --text: #1e293b;
  --dim: #64748b;
  --cyan: #0891b2;
  --orange: #d97706;
  --green: #16a34a;
  --warn: #ea580c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;-webkit-text-size-adjust:100%;overflow-x:hidden;}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;overflow-x:hidden;transition:background .3s,color .3s;}
.hdr{background:linear-gradient(160deg,var(--bg-card) 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:14px 16px 12px;text-align:center;position:sticky;top:0;z-index:300;box-shadow:0 2px 16px rgba(0,0,0,.7);display:flex;align-items:center;justify-content:space-between;}
.hdr-content{flex:1;text-align:center;}
.hdr-chip{display:inline-block;background:var(--cyan);color:#000;font-size:8px;font-weight:900;letter-spacing:1.2px;padding:2px 8px;border-radius:2px;margin-bottom:4px;}
.hdr h1{font-size:15px;font-weight:900;color:var(--text);letter-spacing:.2px;}
.hdr-sub{font-size:9px;color:var(--dim);margin-top:2px;font-family:monospace;}
.theme-toggle{background:var(--bg-input);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.theme-toggle:active{opacity:.7;transform:scale(.95);}
.block{padding:14px 16px 0;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:14px;transition:background .3s,border-color .3s;}
.sect-lbl{font-size:9px;font-weight:900;color:var(--orange);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.sect-lbl::before{content:'';width:3px;height:12px;background:var(--orange);border-radius:1px;display:inline-block;}
.dual-input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.person-input{display:flex;flex-direction:column;gap:6px;}
.person-label{font-size:9px;font-weight:900;letter-spacing:.8px;color:var(--dim);}
.person-label.p1{color:#3b82f6;}
.person-label.p2{color:#a855f7;}
.dial-input-box{display:flex;align-items:center;gap:6px;}
.dial-num{width:60px;height:48px;font-size:26px;font-weight:900;text-align:center;background:var(--bg-input);border:2px solid var(--orange);border-radius:8px;color:var(--orange);font-family:monospace;-webkit-appearance:none;appearance:none;outline:none;transition:all .3s;}
.dial-num.p1{border-color:#3b82f6;}
.dial-num.p2{border-color:#a855f7;}
.dial-num:focus{box-shadow:0 0 12px rgba(6,182,212,.3);}
.dial-num::placeholder{color:var(--border);font-size:18px;opacity:0.2;}
.dial-unit{font-size:11px;color:var(--dim);font-weight:700;}
.prev-box{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:10px;line-height:1.5;color:var(--dim);min-height:40px;font-family:monospace;transition:all .3s;}
.prev-box b{color:var(--orange);font-weight:700;}
.prev-box .ok{color:var(--green);}
.prev-box .warn{color:var(--warn);}
.quick-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.qbtn{background:transparent;border:1.5px solid var(--cyan);color:var(--cyan);padding:10px;border-radius:10px;font-size:12px;font-weight:900;font-family:-apple-system,'Hiragino Sans',sans-serif;cursor:pointer;transition:all .15s;}
.qbtn:active{background:var(--cyan);color:#000;transform:scale(.96);}
.form-row{display:grid;grid-template-columns:auto 1fr 1fr;gap:8px;align-items:center;margin-bottom:10px;}
.date-label{font-size:9px;font-weight:900;color:var(--dim);white-space:nowrap;}
.date-sel{background:var(--bg-input);border:1px solid var(--cyan);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;font-weight:700;font-family:-apple-system,'Hiragino Sans',sans-serif;-webkit-appearance:none;appearance:none;outline:none;transition:all .3s;}
.date-sel:focus{border-color:var(--orange);}
.search-btn{width:100%;background:var(--orange);color:#000;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:900;font-family:-apple-system,'Hiragino Sans',sans-serif;letter-spacing:.3px;cursor:pointer;margin-top:2px;transition:opacity .15s,transform .1s;}
.search-btn:active{opacity:.82;transform:scale(.97);}
.res-area{padding:14px 16px 0;}
.res-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.res-hd-t{font-size:9px;font-weight:900;color:var(--dim);letter-spacing:.8px;text-transform:uppercase;}
.res-cnt{font-size:9px;color:var(--orange);font-family:monospace;background:rgba(245,158,11,.1);padding:3px 8px;border-radius:6px;border:1px solid rgba(245,158,11,.2);}
.day-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;transition:all .3s;}
.day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.day-date{font-size:16px;font-weight:900;color:var(--text);}
.day-badge{font-size:10px;font-weight:900;padding:3px 8px;border-radius:6px;background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.25);}
.dual-persons{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.person-info{padding:8px 10px;}
.person-info:first-child{border-right:1px solid var(--border);}
.p-name{font-size:8px;font-weight:900;letter-spacing:.6px;margin-bottom:6px;color:var(--dim);}
.p-name.p1{color:#3b82f6;}
.p-name.p2{color:#a855f7;}
.p-dial{font-size:18px;font-weight:900;color:var(--orange);font-family:monospace;margin-bottom:4px;}
.p-dial sub{font-size:9px;color:var(--dim);font-weight:400;}
.p-time{font-size:9px;color:var(--text);line-height:1.4;font-family:monospace;}
.p-time.kyu{color:var(--green);font-weight:700;}
.p-time.unk{color:var(--warn);font-weight:700;}
.p-note{font-size:8px;color:var(--dim);margin-top:4px;font-style:italic;}
.empty{text-align:center;padding:50px 20px;color:var(--dim);font-size:12px;}
.empty span{display:block;font-size:28px;opacity:.2;margin-bottom:8px;}
footer{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--bg-card);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:200;}
.footer-link{text-align:center;font-size:8px;color:var(--green);letter-spacing:.2px;text-decoration:none;}
.speak-btn{width:100%;background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:10px;font-size:12px;font-weight:900;cursor:pointer;margin-top:8px;transition:background .15s;font-family:-apple-system,'Hiragino Sans',sans-serif;}
.speak-btn:active{background:rgba(34,197,94,.25);}
.speak-btn.speaking{background:rgba(239,68,68,.12);color:#f87171;border-color:rgba(239,68,68,.3);}
</style>
</head>
<body>
<header class="hdr">
  <div></div>
  <div class="hdr-content">
    <div class="hdr-chip">北大和・学園前 Aダイヤ</div>
    <h1>🚌 出退勤検索くん 2人版</h1>
    <div class="hdr-sub">2026年3月14日改正 ／ 1〜92番</div>
  </div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
</header>

<div class="block">
  <div class="card">
    <div class="sect-lbl">今日のダイヤ番号</div>
    <div class="dual-input-row">
      <div class="person-input">
        <div class="person-label p1">👤 人１</div>
        <div class="dial-input-box">
          <input type="number" id="d1" class="dial-num p1" min="1" max="92" placeholder="11" inputmode="numeric">
          <span class="dial-unit">番</span>
        </div>
        <div class="prev-box" id="prev1">番号を入力</div>
      </div>
      <div class="person-input">
        <div class="person-label p2">👤 人２</div>
        <div class="dial-input-box">
          <input type="number" id="d2" class="dial-num p2" min="1" max="92" placeholder="11" inputmode="numeric">
          <span class="dial-unit">番</span>
        </div>
        <div class="prev-box" id="prev2">番号を入力</div>
      </div>
    </div>
    <button class="speak-btn" id="speakTodayBtn" onclick="handleSpeakToday()">🔊 今日の勤務を読み上げ（2人分）</button>
  </div>
</div>

<div class="block">
  <div class="card">
    <div class="sect-lbl">クイック検索</div>
    <div class="quick-btns">
      <button class="qbtn" onclick="quickSearch('today')">今日</button>
      <button class="qbtn" onclick="quickSearch('week1')">1週間</button>
      <button class="qbtn" onclick="quickSearch('week2')">2週間</button>
    </div>
  </div>
</div>

<div class="block">
  <div class="card">
    <div class="sect-lbl">期間を選んで検索</div>
    <div class="form-row">
      <span class="date-label">開始日</span>
      <select id="sm" class="date-sel" onchange="syncDays('sm','sd')"></select>
      <select id="sd" class="date-sel"></select>
    </div>
    <div class="form-row">
      <span class="date-label">終了日</span>
      <select id="em" class="date-sel" onchange="syncDays('em','ed')"></select>
      <select id="ed" class="date-sel"></select>
    </div>
    <button class="search-btn" onclick="doSearch()">🔍 2人まとめて検索する</button>
  </div>
</div>

<div id="results"></div>
<footer><a href="#" class="footer-link">by AIタケタニ</a></footer>

const DW=['日','月','火','水','木','金','土'];

function toggleTheme(){const html=document.documentElement;const btn=document.getElementById('themeToggle');if(html.classList.contains('light')){html.classList.remove('light');btn.textContent='🌙';localStorage.setItem('theme','dark');}else{html.classList.add('light');btn.textContent='☀️';localStorage.setItem('theme','light');}}
function initTheme(){const saved=localStorage.getItem('theme');if(saved==='light'){document.documentElement.classList.add('light');document.getElementById('themeToggle').textContent='☀️';}else{document.documentElement.classList.remove('light');document.getElementById('themeToggle').textContent='🌙';}}

function toISO(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isHol(d){return HOLIDAYS.has(toISO(d));}
function dayType(d){const w=d.getDay();if(w===0||isHol(d))return '日祝';if(w===6)return '土';return '平';}
function calcDial(target,todayDial){const today=new Date();today.setHours(0,0,0,0);const diff=Math.round((target-today)/86400000);return ((todayDial-1+diff)%92+92)%92+1;}

function buildMonths(id){const s=document.getElementById(id);for(let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.textContent=m+'月';s.appendChild(o);}}
function syncDays(mId,dId){const m=parseInt(document.getElementById(mId).value);const sel=document.getElementById(dId);const pre=parseInt(sel.value)||1;sel.innerHTML='';const max=new Date(2026,m,0).getDate();for(let i=1;i<=max;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'日';sel.appendChild(o);}sel.value=Math.min(pre,max);}
function initSel(){buildMonths('sm');buildMonths('em');const today=new Date();const end=new Date(today.getTime()+86400000*6);document.getElementById('sm').value=today.getMonth()+1;syncDays('sm','sd');document.getElementById('sd').value=today.getDate();document.getElementById('em').value=end.getMonth()+1;syncDays('em','ed');document.getElementById('ed').value=end.getDate();}

function updatePrev(inputId,prevId){
  const v=parseInt(document.getElementById(inputId).value);
  const el=document.getElementById(prevId);
  if(!v||v<1||v>92){el.innerHTML='番号を入力';return;}
  const today=new Date();
  const dt=dayType(today);
  const rec=DB[v];
  if(!rec){el.innerHTML=`<b>${v}番</b><br><span class="ok">🎉 公休</span>`;return;}
  const slot=rec[dt];
  if(!slot){el.innerHTML=`<b>${v}番</b><br><span class="ok">🎉 公休</span>`;return;}
  if(slot.o==='—'){el.innerHTML=`<b>${v}番</b><br><span class="warn">要確認</span>`;return;}
  el.innerHTML=`<b>${v}番</b><br>${slot.o}<br>${slot.w}h`;
}

function doSearch(){
  const d1=parseInt(document.getElementById('d1').value);
  const d2=parseInt(document.getElementById('d2').value);
  if(!d1||d1<1||d1>92||!d2||d2<1||d2>92){alert('ダイヤ番号を入力してください');return;}
  const sm=parseInt(document.getElementById('sm').value);
  const sd=parseInt(document.getElementById('sd').value);
  const em=parseInt(document.getElementById('em').value);
  const ed=parseInt(document.getElementById('ed').value);
  const s=new Date(2026,sm-1,sd);
  const e=new Date(2026,em-1,ed);
  if(s>e){alert('開始日は終了日以前にしてください');return;}
  if((e-s)/86400000>120){alert('最大120日間まで検索できます');return;}
  const rows=[];
  let cur=new Date(s);
  while(cur<=e){
    const dn1=calcDial(cur,d1);
    const dn2=calcDial(cur,d2);
    const dt=dayType(cur);
    const rec1=DB[dn1];
    const rec2=DB[dn2];
    rows.push({m:cur.getMonth()+1,d:cur.getDate(),dw:DW[cur.getDay()],dt,hol:isHol(cur),
      p1:{dn:dn1,rec:rec1,slot:rec1?rec1[dt]:null},
      p2:{dn:dn2,rec:rec2,slot:rec2?rec2[dt]:null}
    });
    cur.setDate(cur.getDate()+1);
  }
  render(rows);
  window._lastRows=rows;
}

function quickSearch(type){
  const d1=parseInt(document.getElementById('d1').value);
  const d2=parseInt(document.getElementById('d2').value);
  if(!d1||d1<1||d1>92||!d2||d2<1||d2>92){alert('ダイヤ番号を入力してください');return;}
  const t=new Date();t.setHours(0,0,0,0);
  let from,to;
  if(type==='today'){from=to=t;}
  else if(type==='week1'){from=new Date(t);to=new Date(t);to.setDate(t.getDate()+6);}
  else if(type==='week2'){from=new Date(t);to=new Date(t);to.setDate(t.getDate()+13);}
  const rows=[];
  let cur=new Date(from);
  while(cur<=to){
    const dn1=calcDial(cur,d1);
    const dn2=calcDial(cur,d2);
    const dt=dayType(cur);
    const rec1=DB[dn1];
    const rec2=DB[dn2];
    rows.push({m:cur.getMonth()+1,d:cur.getDate(),dw:DW[cur.getDay()],dt,hol:isHol(cur),
      p1:{dn:dn1,rec:rec1,slot:rec1?rec1[dt]:null},
      p2:{dn:dn2,rec:rec2,slot:rec2?rec2[dt]:null}
    });
    cur.setDate(cur.getDate()+1);
  }
  render(rows);
  window._lastRows=rows;
}

function render(rows){
  const el=document.getElementById('results');
  if(!rows.length){el.innerHTML='<div class="res-area"><div class="empty"><span>📋</span>該当する日がありません</div></div>';return;}
  let html=`<div class="res-area"><div class="res-hd"><div class="res-hd-t">検索結果</div><div class="res-cnt">${rows.length}日間</div></div>`;
  rows.forEach(r=>{
    html+=`<div class="day-card">
      <div class="day-header">
        <div class="day-date">${r.m}/${r.d}（${r.dw}）${r.hol?'祝':''}</div>
        <div class="day-badge">${r.dt==='平'?'平日':r.dt}</div>
      </div>
      <div class="dual-persons">
        <div class="person-info">
          <div class="p-name p1">👤 人１ / ${r.p1.dn}番</div>
          <div class="p-dial">${r.p1.dn}<sub>番</sub></div>
          ${renderPersonTime(r.p1)}
        </div>
        <div class="person-info">
          <div class="p-name p2">👤 人２ / ${r.p2.dn}番</div>
          <div class="p-dial">${r.p2.dn}<sub>番</sub></div>
          ${renderPersonTime(r.p2)}
        </div>
      </div>
    </div>`;
  });
  html+='<button class="speak-btn" id="speakResBtn" onclick="handleSpeakResults()">🔊 検索結果を読み上げ</button></div>';
  el.innerHTML=html;
}

function renderPersonTime(p){
  if(!p.rec){return '<div class="p-time kyu">公休</div>';}
  const slot=p.slot;
  if(!slot){return '<div class="p-time kyu">公休</div>';}
  if(slot.o==='—'){return '<div class="p-time unk">要確認</div>';}
  return `<div class="p-time">${slot.o}<br>${slot.w}h</div>`;
}

<script>
function fmtT(t){if(!t)return '';t=t.trim();const m=t.match(/^(\d+):(\d+)$/);if(!m)return t;const h=parseInt(m[1]);const min=m[2];if(h>=24)return `翌${h-24}時${min==='00'?'':min+'分'}`;return `${h}時${min==='00'?'':min+'分'}`;}
function timeToSpeech(o,w){if(!o||o==='—')return '要確認';if(!o.includes('/')){const[start,end]=o.split('〜');const ws=w?w.replace(':','時間')+'分':'';return `${fmtT(start)}から${fmtT(end)}、${ws}`;}const tildeSplit=o.split('〜');if(tildeSplit.length===2){const starts=tildeSplit[0].split('/');const ends=tildeSplit[1].split('/');const wParts=w?w.split('/'):[];if(starts.length>=2&&ends.length>=2){let text='';text+=`前半${fmtT(starts[0])}から${fmtT(ends[0])}`;if(wParts[0])text+=`${wParts[0]}`;text+=`、後半${fmtT(starts[1])}から${fmtT(ends[1])}`;if(wParts[1])text+=`${wParts[1]}`;return text;}}return o.replace(/〜/g,'から');}
function personSpeechText(dn,slot,rec){if(!rec||!slot){return '公休';}if(slot.o==='—'){return '要確認';}return timeToSpeech(slot.o,slot.w);}
function speakText(text){if(!('speechSynthesis' in window)){alert('読み上げに対応していません');return;}if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();if(document.getElementById('speakTodayBtn'))document.getElementById('speakTodayBtn').classList.remove('speaking');if(document.getElementById('speakResBtn'))document.getElementById('speakResBtn').classList.remove('speaking');return;}const utter=new SpeechSynthesisUtterance(text);utter.lang='ja-JP';utter.rate=0.95;const v=window.speechSynthesis.getVoices();const jp=v.find(x=>x.lang.startsWith('ja'));if(jp)utter.voice=jp;if(window.speechSynthesis.getVoices().length===0)window.speechSynthesis.onvoiceschanged=()=>{};window.speechSynthesis.speak(utter);utter.onend=()=>{if(document.getElementById('speakTodayBtn'))document.getElementById('speakTodayBtn').classList.remove('speaking');if(document.getElementById('speakResBtn'))document.getElementById('speakResBtn').classList.remove('speaking');};utter.onerror=()=>{if(document.getElementById('speakTodayBtn'))document.getElementById('speakTodayBtn').classList.remove('speaking');if(document.getElementById('speakResBtn'))document.getElementById('speakResBtn').classList.remove('speaking');};}
function handleSpeakToday(){const v1=parseInt(document.getElementById('d1').value);const v2=parseInt(document.getElementById('d2').value);if((!v1||v1<1||v1>92)&&(!v2||v2<1||v2>92)){speakText('ダイヤ番号を入力してください');return;}const today=new Date();const m=today.getMonth()+1;const d=today.getDate();const dw=['日','月','火','水','木','金','土'][today.getDay()];const dt=dayType(today);let text=`${m}月${d}日${dw}曜日。`;if(v1&&v1>=1&&v1<=92){const rec1=DB[v1];const slot1=rec1?rec1[dt]:null;text+=`人1、${v1}番、${personSpeechText(v1,slot1,rec1)}。`;}if(v2&&v2>=1&&v2<=92){const rec2=DB[v2];const slot2=rec2?rec2[dt]:null;text+=`人2、${v2}番、${personSpeechText(v2,slot2,rec2)}`;}const btn=document.getElementById('speakTodayBtn');if(btn){btn.classList.add('speaking');}speakText(text);}
function handleSpeakResults(){const rows=window._lastRows;if(!rows||!rows.length){speakText('先に検索してください');return;}let text=`${rows.length}日間の検索結果。`;rows.forEach(r=>{text+=`${r.m}月${r.d}日${r.dw}曜。人1、${r.p1.dn}番、${personSpeechText(r.p1.dn,r.p1.slot,r.p1.rec)}。人2、${r.p2.dn}番、${personSpeechText(r.p2.dn,r.p2.slot,r.p2.rec)}。`;});const btn=document.getElementById('speakResBtn');if(btn){btn.classList.add('speaking');}speakText(text);}
</script>
