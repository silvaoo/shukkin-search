<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>学A2</title>

<meta name="apple-mobile-web-app-title" content="学A2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e27">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
<link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96.png">

<style>
:root {
  --bg: #0a0e27;
  --bg-card: #111633;
  --bg-card2: #1a1f3a;
  --cyan: #00f5ff;
  --pink: #ff1493;
  --purple: #b366ff;
  --blue: #3b82f6;
  --yellow: #ffaa00;
  --green: #22c55e;
  --orange: #ff8c00;
  --text: #dde0ff;
  --dim: #5a5a90;
  --border: rgba(0,245,255,0.2);
}
html.light {
  --bg: #eeeef8;
  --bg-card: #ffffff;
  --bg-card2: #f0f0ff;
  --cyan: #0077bb;
  --pink: #cc0055;
  --purple: #7700cc;
  --blue: #1d4ed8;
  --yellow: #aa7700;
  --green: #007744;
  --orange: #cc6600;
  --text: #111133;
  --dim: #9090bb;
  --border: rgba(0,119,187,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  padding: 14px 12px 120px;
  transition: background 0.3s, color 0.3s;
}
#fw { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
header {
  text-align: center;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header h1 { font-size: 18px; font-weight: bold; color: var(--cyan); }
header .subtitle { font-size: 11px; color: var(--dim); margin-top: 4px; }
#themeToggle {
  background: var(--bg-card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 14px;
  transition: background 0.3s, border-color 0.3s;
}
.card h2 {
  font-size: 13px;
  color: var(--cyan);
  margin-bottom: 12px;
  font-weight: bold;
  letter-spacing: 1px;
}
.today-section {
  border: 2px solid var(--cyan) !important;
}
.dual-inputs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.input-group label {
  font-size: 11px;
  color: var(--dim);
  font-weight: bold;
}
.input-group input {
  width: 100%;
  padding: 12px;
  background: var(--bg-card2);
  border: 2px solid var(--orange);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  font-weight: bold;
  transition: all 0.3s;
}
.input-group input::placeholder {
  color: #9a9ab0;
  opacity: 0.2;
}
.input-group input:focus {
  outline: none;
  border-color: var(--cyan);
}
.preview-box {
  background: var(--bg-card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-size: 11px;
  line-height: 1.6;
  color: var(--dim);
  min-height: 40px;
  margin-bottom: 0;
  transition: all 0.3s;
}
.preview-box.empty {
  background: none;
  border: none;
  padding: 4px 2px;
  min-height: 0;
}
.preview-box b {
  color: var(--orange);
}
.preview-box .ok-text {
  color: var(--green);
  font-weight: 700;
}
.preview-box .warn-text {
  color: var(--orange);
  font-weight: 700;
}
.speak-btn {
  width: 100%;
  background: rgba(34, 197, 94, 0.12);
  color: var(--green);
  border: 1px solid rgba(34, 197, 94, 0.3);
  border-radius: 8px;
  padding: 10px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 0;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.3s;
}
.speak-btn:active {
  background: rgba(34, 197, 94, 0.25);
}
.quick-search {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.quick-search button {
  padding: 10px;
  background: transparent;
  border: 2px solid var(--orange);
  color: var(--orange);
  border-radius: 8px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
}
.quick-search button:active {
  background: var(--orange);
  color: var(--bg);
}
.date-inputs {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}
.date-row {
  display: grid;
  grid-template-columns: auto 1fr 1fr;
  gap: 8px;
  align-items: center;
}
.date-row label {
  font-size: 11px;
  color: var(--dim);
  font-weight: bold;
  white-space: nowrap;
}
.date-row select {
  padding: 8px;
  background: var(--bg-card2);
  border: 2px solid var(--orange);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  transition: all 0.3s;
}
.date-row select:focus {
  outline: none;
  border-color: var(--cyan);
}
.search-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  border: none;
  color: #fff;
  border-radius: 8px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
}
.search-btn:active {
  opacity: 0.8;
}
#results {
  margin-top: 14px;
}
.result-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  transition: all 0.3s;
}
.result-date {
  font-size: 14px;
  font-weight: bold;
  color: var(--text);
  margin-bottom: 10px;
}
.result-dual {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
.result-person {
  padding: 8px;
  font-size: 11px;
  line-height: 1.6;
}
.result-person:first-child {
  border-right: 1px solid var(--border);
}
.result-person .label {
  font-size: 10px;
  color: var(--dim);
  margin-bottom: 4px;
  font-weight: bold;
}
.result-person .dial {
  font-size: 18px;
  font-weight: bold;
  color: var(--orange);
  margin-bottom: 6px;
}
.result-person .time {
  color: var(--text);
}
.result-person .time.holiday {
  color: var(--green);
}
.footer {
  text-align: center;
  font-size: 11px;
  color: var(--dim);
  margin-top: 10px;
  line-height: 1.8;
}
.footer .credit {
  color: var(--green);
  font-weight: 700;
  margin-top: 4px;
}
</style>
</head>
<body>

<canvas id="fw"></canvas>

<header>
  <div>
    <h1>🚌 出退勤検索くん</h1>
    <h1 style="font-size: 13px; margin-top: 4px;">二人同時検索版</h1>
    <div class="subtitle">北大和・学園前 Aダイヤ ／ 1〜92番</div>
  </div>
  <button id="themeToggle" onclick="toggleTheme()">🌙</button>
</header>

<div class="card today-section">
  <h2>本日7/12(土)のダイヤ番号を入力</h2>
  <div class="dual-inputs">
    <div class="input-group">
      <label>1人目</label>
      <input type="number" id="dial1" min="1" max="92" inputmode="numeric" autocomplete="off">
      <div class="preview-box empty" id="preview1">↑ 1〜92の番号を入力してください</div>
    </div>
    <div class="input-group">
      <label>二人目</label>
      <input type="number" id="dial2" min="1" max="92" inputmode="numeric" autocomplete="off">
      <div class="preview-box empty" id="preview2">↑ 1〜92の番号を入力してください</div>
    </div>
  </div>
  <button class="speak-btn" onclick="handleSpeakBoth()">🔊 今日の2人の勤務を読み上げ</button>
</div>

<div class="card">
  <h2>クイック検索</h2>
  <div class="quick-search">
    <button onclick="quickSearch(0)">今日</button>
    <button onclick="quickSearch(6)">1週間</button>
    <button onclick="quickSearch(13)">2週間</button>
  </div>
</div>

<div class="card">
  <h2>期間を選んで検索</h2>
  <div class="date-inputs">
    <div class="date-row">
      <label>開始日</label>
      <select id="fromMonth" onchange="updateFromDays()"></select>
      <select id="fromDay"></select>
    </div>
    <div class="date-row">
      <label>終了日</label>
      <select id="toMonth" onchange="updateToDays()"></select>
      <select id="toDay"></select>
    </div>
  </div>
  <button class="search-btn" onclick="doSearch()">🔍 この期間を検索する</button>
</div>

<div id="results"></div>

<div class="footer">
  <div>⚠ あくまでも目安としてお使いください。</div>
  <div>出退勤時間に誤りがあっても当方は責任を負いかねます。</div>
  <div class="credit">by AIタケタニ</div>
</div>

const HOLIDAYS=new Set(['2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06','2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23','2026-10-12','2026-11-03','2026-11-23','2027-01-01','2027-01-11','2027-02-11','2027-02-23','2027-03-21','2027-03-22','2027-04-29','2027-05-03','2027-05-04','2027-05-05','2027-07-19','2027-08-11','2027-09-20','2027-09-23','2027-10-11','2027-11-03','2027-11-23']);

let fwc, fwx, particles=[];
try{
  fwc=document.getElementById('fw');
  fwx=fwc.getContext('2d');
  window.addEventListener('resize',()=>{fwc.width=window.innerWidth;fwc.height=window.innerHeight;});
}catch(e){console.log('花火機能初期化エラー:',e);}

function triggerFireworks(){
  try{
    if(!fwc||!fwx)return;
    fwc.width=window.innerWidth;fwc.height=window.innerHeight;particles=[];
    for(let i=0;i<2;i++){const x=Math.random()*fwc.width,y=Math.random()*fwc.height*0.5;const colors=['#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff'];for(let j=0;j<30;j++){const a=Math.random()*Math.PI*2,sp=Math.random()*5+3;const c=colors[Math.floor(Math.random()*colors.length)];particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,c,life:75});}}
    drawFireworks();
  }catch(e){console.log('花火エラー:',e);}
}

function drawFireworks(){
  try{
    if(!fwx)return;
    fwx.clearRect(0,0,fwc.width,fwc.height);particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;fwx.globalAlpha=p.life/75;fwx.fillStyle=p.c;fwx.beginPath();fwx.arc(p.x,p.y,3,0,Math.PI*2);fwx.fill();p.life--;});fwx.globalAlpha=1;if(particles.length>0)requestAnimationFrame(drawFireworks);else fwx.clearRect(0,0,fwc.width,fwc.height);
  }catch(e){console.log('花火描画エラー:',e);}
}

/* ロケット花火風の音：ぴゅーーーん（打ち上げ）→ドカン（爆発） */
/* 軽快な「ひゅーーーん」音：高音から始まり、だんだん小さくなりながら減衰していく */
function rocketFirework(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const now=ctx.currentTime;
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(1400,now);
    osc.frequency.exponentialRampToValueAtTime(500,now+0.9);
    gain.gain.setValueAtTime(0.18,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+0.9);
    osc.start(now);osc.stop(now+0.9);
  }catch(e){console.log('効果音エラー:',e);}
}

function toggleTheme(){const html=document.documentElement;html.classList.toggle('light');document.getElementById('themeToggle').textContent=html.classList.contains('light')?'☀️':'🌙';}
function initTheme(){document.documentElement.classList.remove('light');document.getElementById('themeToggle').textContent='🌙';}
function toISO(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isHol(d){return HOLIDAYS.has(toISO(d));}
function dayType(d){const w=d.getDay();if(w===0||isHol(d))return '日祝';if(w===6)return '土';return '平';}
function calcDial(target,todayDial){const today=new Date();today.setHours(0,0,0,0);const diff=Math.round((target-today)/86400000);return ((todayDial-1+diff)%92+92)%92+1;}

function updatePreview(dialId,previewId){const v=parseInt(document.getElementById(dialId).value);const box=document.getElementById(previewId);if(!v||v<1||v>92){box.classList.add('empty');box.innerHTML='↑ 1〜92の番号を入力してください';return;}box.classList.remove('empty');const today=new Date();const m=today.getMonth()+1,d=today.getDate();const dw=DW[today.getDay()];const dtLabel=isHol(today)?`${dw}・祝`:dw;const dt=dayType(today);const rec=DB[v];if(!rec||!rec[dt]){box.innerHTML=`<b>${v}番ダイヤ</b> → ${m}/${d}（${dtLabel}）は <span class="ok-text">🎉 公休</span> です`;return;}const slot=rec[dt];if(slot.o==='—'){box.innerHTML=`<b>${v}番ダイヤ</b> → ${m}/${d}（${dtLabel}）勤務: <span class="warn-text">要確認</span>`;return;}box.innerHTML=`<b>${v}番</b> ${m}/${d}（${dtLabel}）▶ 勤務: <b>${slot.o}</b> ／ 労働: <b>${slot.w}h</b>`;}

function handleSpeakBoth(){const d1=parseInt(document.getElementById('dial1').value);const d2=parseInt(document.getElementById('dial2').value);if(!d1||!d2||d1<1||d1>92||d2<1||d2>92){speakText('両方のダイヤ番号を1〜92の範囲で入力してください');return;}const today=new Date();const m=today.getMonth()+1,d=today.getDate();const dw=DW[today.getDay()];const dt=dayType(today);const holLabel=isHol(today)?'祝日':'';let text=`${m}月${d}日、${dw}曜日${holLabel}。`;const rec1=DB[d1];const rec2=DB[d2];text+=`1人目、${d1}番。`;if(!rec1||!rec1[dt]){text+='公休。';}else{const s1=rec1[dt];if(!s1||s1.o==='—'){text+='詳細はダイヤ表を確認してください。';}else{text+=s1.o.replace('〜','から')+'、'+s1.w+'時間。';}}text+=`2人目、${d2}番。`;if(!rec2||!rec2[dt]){text+='公休。';}else{const s2=rec2[dt];if(!s2||s2.o==='—'){text+='詳細はダイヤ表を確認してください。';}else{text+=s2.o.replace('〜','から')+'、'+s2.w+'時間。';}}speakText(text);}

function speakText(text){if(!('speechSynthesis'in window)){alert('読み上げに対応していません');return;}window.speechSynthesis.cancel();const utter=new SpeechSynthesisUtterance(text);utter.lang='ja-JP';utter.rate=0.95;const v=window.speechSynthesis.getVoices();const jp=v.find(x=>x.lang.startsWith('ja'));if(jp)utter.voice=jp;window.speechSynthesis.speak(utter);}

function buildMonths(id){const s=document.getElementById(id);for(let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.textContent=m+'月';s.appendChild(o);}}
function updateFromDays(){const m=parseInt(document.getElementById('fromMonth').value);const sel=document.getElementById('fromDay');sel.innerHTML='';const max=new Date(2026,m,0).getDate();for(let i=1;i<=max;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'日';sel.appendChild(o);}}
function updateToDays(){const m=parseInt(document.getElementById('toMonth').value);const sel=document.getElementById('toDay');sel.innerHTML='';const max=new Date(2026,m,0).getDate();for(let i=1;i<=max;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'日';sel.appendChild(o);}}
function quickSearch(days){const d1=parseInt(document.getElementById('dial1').value);const d2=parseInt(document.getElementById('dial2').value);if(!d1||!d2){alert('両方のダイヤ番号を入力してください');return;}rocketFirework();const t=new Date();t.setHours(0,0,0,0);const e=new Date(t);e.setDate(t.getDate()+days);doSearchRange(t,e,d1,d2);}
function doSearch(){const d1=parseInt(document.getElementById('dial1').value);const d2=parseInt(document.getElementById('dial2').value);if(!d1||!d2){alert('両方のダイヤ番号を入力してください');return;}rocketFirework();const sm=parseInt(document.getElementById('fromMonth').value);const sd=parseInt(document.getElementById('fromDay').value);const em=parseInt(document.getElementById('toMonth').value);const ed=parseInt(document.getElementById('toDay').value);const s=new Date(2026,sm-1,sd);const e=new Date(2026,em-1,ed);doSearchRange(s,e,d1,d2);}
function doSearchRange(start,end,d1,d2){const rows=[];let cur=new Date(start);while(cur<=end){const dn1=calcDial(cur,d1);const dn2=calcDial(cur,d2);const dt=dayType(cur);const rec1=DB[dn1];const rec2=DB[dn2];rows.push({m:cur.getMonth()+1,d:cur.getDate(),dw:DW[cur.getDay()],dt,hol:isHol(cur),p1:{dn:dn1,rec:rec1,slot:rec1?rec1[dt]:null},p2:{dn:dn2,rec:rec2,slot:rec2?rec2[dt]:null}});cur.setDate(cur.getDate()+1);}window._lastRows=rows;render(rows);}
function getTimeStr(slot,rec){if(!rec||!slot)return '公休';if(slot.o==='—')return '要確認';return slot.o+'（'+slot.w+'h）';}
function render(rows){const el=document.getElementById('results');if(!rows.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--dim);">該当する日がありません</div>';return;}let html='';rows.forEach(r=>{html+='<div class="result-card"><div class="result-date">'+r.m+'/'+r.d+'（'+r.dw+'）'+(r.hol?'祝':'')+'</div><div class="result-dual"><div class="result-person"><div class="label">1人目 / '+r.p1.dn+'番</div><div class="dial">'+r.p1.dn+'</div><div class="time'+((!r.p1.rec||!r.p1.slot)?' holiday':'')+'">'+getTimeStr(r.p1.slot,r.p1.rec)+'</div></div><div class="result-person"><div class="label">二人目 / '+r.p2.dn+'番</div><div class="dial">'+r.p2.dn+'</div><div class="time'+((!r.p2.rec||!r.p2.slot)?' holiday':'')+'">'+getTimeStr(r.p2.slot,r.p2.rec)+'</div></div></div></div>';});html+='<button class="speak-btn" onclick="handleSpeakResults()">🔊 検索結果を読み上げ</button>';el.innerHTML=html;}

function handleSpeakResults(){if(!window._lastRows||!window._lastRows.length){speakText('先に検索してください');return;}const rows=window._lastRows;let text=`${rows.length}日間の検索結果。`;rows.forEach(r=>{text+=`${r.m}月${r.d}日${r.dw}曜。1人目、${r.p1.dn}番、${getTimeStr(r.p1.slot,r.p1.rec)}。2人目、${r.p2.dn}番、${getTimeStr(r.p2.slot,r.p2.rec)}。`;});speakText(text);}
